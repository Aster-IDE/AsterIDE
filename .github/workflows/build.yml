name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [ main, master, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-bundle
      run: cargo install cargo-bundle

    - name: Build app bundle
      run: |
        cd crates/editor
        cargo bundle --release

    - name: Create DMG
      run: |
        mkdir -p build

        BUILD_DIR="build/AsterIDE"
        rm -rf "$BUILD_DIR"
        mkdir -p "$BUILD_DIR"

        cp -r "target/release/bundle/osx/AsterIDE.app" "$BUILD_DIR/"

        xattr -rc "$BUILD_DIR/AsterIDE.app"
        codesign --force --deep --sign - "$BUILD_DIR/AsterIDE.app"

        ln -s /Applications "$BUILD_DIR/Applications"

        hdiutil create -volname "AsterIDE" -srcfolder "$BUILD_DIR" -ov -format UDZO "build/AsterIDE.dmg"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AsterIDE-macos
        path: build/AsterIDE.dmg

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        prerelease: ${{ contains(github.ref_name, '-') }}
        draft: true
        files: |
          build/AsterIDE.dmg
        name: AsterIDE ${{ github.ref_name }}
        fail_on_unmatched_files: true
